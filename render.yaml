services:
  # 1. API Web Service
  - type: web
    name: leadforge-api
    plan: free
    runtime: python
    buildCommand: "./render-build.sh"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://your-vercel-domain.vercel.app"
      - key: REDIS_URL
        fromService:
          type: redis
          name: leadforge-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.12"

  # 2. Background Worker
  - type: worker
    name: leadforge-worker
    plan: free
    runtime: python
    buildCommand: "./render-build.sh"
    startCommand: "cd backend && celery -A app.core.celery_app worker --loglevel=info --concurrency=1"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: leadforge-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.12"

  # 3. Redis Instance
  - type: redis
    name: leadforge-redis
    ipAllowList: [] # Standard for Render Redis internally
